<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김비서를 소개합니다</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(255, 255, 255, 0.3);
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
            --shadow-hover: 0 15px 50px rgba(31, 38, 135, 0.3);
            --button-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --button-hover: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        [data-theme="dark"] {
            --bg-primary: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            --bg-secondary: linear-gradient(135deg, #2d1b69 0%, #1f0f4c 100%);
            --card-bg: rgba(30, 20, 60, 0.4);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 15px 50px rgba(0, 0, 0, 0.5);
            --button-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --button-hover: 0 15px 40px rgba(102, 126, 234, 0.8);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-secondary);
            opacity: 0.5;
            animation: gradientShift 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.7; }
        }

        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1.2em;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover {
            background: var(--card-bg);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .theme-toggle span {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9em;
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: var(--shadow);
            text-align: center;
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5em;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-weight: 700;
            background: var(--bg-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .intro-text {
            font-size: 1.1em;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .roles {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 50px;
            text-align: left;
        }

        .role-item {
            background: rgba(102, 126, 234, 0.1);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-left: 4px solid;
            border-left-color: #667eea;
            font-size: 1em;
            color: var(--text-secondary);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        [data-theme="dark"] .role-item {
            background: rgba(102, 126, 234, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.15);
        }

        .role-item:hover {
            transform: translateX(5px);
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .role-item strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }

        .cta-button {
            display: inline-block;
            background: var(--button-bg);
            color: white;
            padding: 18px 50px;
            font-size: 1.1em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: var(--button-hover);
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 25px;
                border-radius: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .theme-toggle {
                top: 15px;
                right: 15px;
                padding: 8px 15px;
            }

            .cta-button {
                padding: 15px 40px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <!-- 상단 네비게이션 메뉴 -->
    <nav class="nav-menu">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">📊 김비서</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">메인</a>
                <a href="dashboard.html" class="nav-link">대시보드</a>
                <a href="meeting-result.html" class="nav-link">회의록</a>
                <a href="chart.html" class="nav-link">매출 현황</a>
                <a href="diagram.html" class="nav-link">업무 프로세스</a>
                <a href="report.html" class="nav-link">사이트 분석</a>
            </div>
        </div>
    </nav>

    <button class="theme-toggle" id="themeToggle" title="테마 전환">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel"></span>
    </button>

    <div class="container">
        <h1>김비서를 소개합니다</h1>

        <p class="intro-text">
            효율적인 업무 관리와 일정 조율을 통해 팀의 생산성을 높여주는 스마트 비서입니다.
        </p>

        <div class="roles">
            <div class="role-item">
                <strong>📊 데이터 분석</strong>
                매출 현황 및 프로젝트 진행률을 한눈에 파악하고 의사결정을 지원합니다.
            </div>
            <div class="role-item">
                <strong>📅 일정 관리</strong>
                주간 일정을 체계적으로 정리하고 중요한 미팅을 놓치지 않도록 도와줍니다.
            </div>
            <div class="role-item">
                <strong>✅ 업무 추적</strong>
                할 일 목록을 우선순위별로 관리하고 진행 상황을 실시간으로 확인합니다.
            </div>
        </div>

        <a href="dashboard.html" class="cta-button">내 대시보드 보기</a>
    </div>

    <script>
        // 테마 시스템
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');
        const html = document.documentElement;

        // 저장된 테마 확인 또는 기본값
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            setTheme(savedTheme);
        }

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);

            if (theme === 'dark') {
                themeIcon.textContent = '☀️';
                themeLabel.textContent = 'Light';
            } else {
                themeIcon.textContent = '🌙';
                themeLabel.textContent = 'Dark';
            }
        }

        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        }

        themeToggle.addEventListener('click', toggleTheme);

        // 네비게이션 현재 페이지 표시
        function setActiveNav() {
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const navLinks = document.querySelectorAll('.nav-link');

            navLinks.forEach(link => {
                link.classList.remove('active');
                const href = link.getAttribute('href');
                if (href === currentPage || (currentPage === '' && href === 'index.html')) {
                    link.classList.add('active');
                }
            });
        }

        setActiveNav();
        initTheme();
    </script>
</body>
</html>
